name: Renovate

on:
  workflow_dispatch:
  # Daily at 1:30AM EST (6:30AM UTC), with a second run at 1:40AM EST (6:40AM UTC)
  # Tier 5 dependency: actions.test-dotnet -> containers.dotnet10 -> actions.publish-container -> actions.semantic-version -> containers.base
  # Run 1 creates PRs, CI validates, Run 2 auto-merges 10 minutes apart.
  schedule:
    - cron: '30 6 * * *'
    - cron: '40 6 * * *'

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        with:
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false

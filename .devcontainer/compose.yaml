services:
  build-dev:
    container_name: build-dev
    image: docker.io/spritelydev/dotnet10-devcontainer:0.4.4@sha256:72b47b91578b2b90095047fba0cc43d772537af2f1a252d82f94f74be1decfe7
    privileged: true
    command: /bin/sh -c "sleep infinity"
    volumes:
      - ../:/src
      - ${HOME:-$USERPROFILE}/.ssh:/root/.ssh:ro
    env_file:
      - .env
    # Environment variables have higher precedence than the .env file
    environment:
      - NUGET_TOKEN=${NUGET_TOKEN}
    network_mode: "host"

services:
  build-dev:
    container_name: build-dev
    image: docker.io/spritelydev/dotnet10-devcontainer:0.4.94@sha256:6c58dad0f8c41bd188f17e5830352aa4903b1591376ac6202e6594cf4cbdebdd
    privileged: true
    command: /bin/sh -c "sleep infinity"
    volumes:
      - ../:/src
      - ${HOME:-$USERPROFILE}/.ssh:/root/.ssh:ro
    env_file:
      - .env
    # Environment variables have higher precedence than the .env file
    environment:
      - NUGET_TOKEN=${NUGET_TOKEN}
    network_mode: "host"
